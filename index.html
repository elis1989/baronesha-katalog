<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baronesha — Premium Food Catalog</title>
<meta name="description" content="Katalogu i produkteve premium - Baronesha">
<style>
  :root {
    --gold: #C9A55C;
    --gold-light: #E5C97A;
    --gold-dark: #A8843D;
    --gold-deep: #8B6B2E;
    --black: #0A0A0A;
    --black-soft: #141414;
    --black-card: #1A1A1A;
    --ink: #F5EFE0;
    --muted: #8C8378;
    --line: #2B2418;
    --line-gold: rgba(201, 165, 92, 0.25);
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.4);
    --shadow-gold: 0 0 24px rgba(201, 165, 92, 0.15);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Cormorant Garamond", "Playfair Display", Georgia, "Times New Roman", serif;
    background: var(--black);
    background-image:
      radial-gradient(ellipse at top, rgba(201, 165, 92, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(201, 165, 92, 0.04) 0%, transparent 50%);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .ui-font {
    font-family: "Helvetica Neue", "Inter", system-ui, sans-serif;
  }

  /* Loading */
  .loading {
    position: fixed; inset: 0; background: var(--black); color: var(--gold);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    z-index: 1000; transition: opacity .5s;
  }
  .loading.hidden { opacity: 0; pointer-events: none; }
  .loading img { max-width: 180px; opacity: .9; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid rgba(201, 165, 92, .15);
    border-top-color: var(--gold);
    border-radius: 50%; animation: spin 1s linear infinite; margin-top: 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Header */
  header.topbar {
    background: linear-gradient(180deg, #000 0%, var(--black) 100%);
    border-bottom: 1px solid var(--line-gold);
    padding: 22px 32px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; position: sticky; top: 0; z-index: 50;
    box-shadow: 0 4px 30px rgba(0,0,0,.6);
  }
  .brand {
    display: flex; align-items: center; gap: 16px;
  }
  .brand-logo {
    height: 56px; width: auto;
    filter: drop-shadow(0 2px 8px rgba(201, 165, 92, 0.3));
  }
  .brand-meta { display: flex; flex-direction: column; }
  .brand-title {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 13px; font-weight: 500; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gold);
  }
  .brand-sub {
    font-family: "Helvetica Neue", sans-serif;
    font-size: 11px; color: var(--muted); margin-top: 4px;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .last-updated {
    font-family: "Helvetica Neue", sans-serif;
    font-size: 11px; color: var(--gold);
    padding: 7px 14px; background: rgba(201, 165, 92, 0.08);
    border: 1px solid var(--line-gold); border-radius: 999px;
    letter-spacing: 0.5px;
  }

  /* Hero title */
  .hero {
    text-align: center; padding: 50px 20px 30px;
    border-bottom: 1px solid var(--line-gold);
    margin-bottom: 30px;
  }
  .hero-title {
    font-family: "Cormorant Garamond", "Playfair Display", Georgia, serif;
    font-size: 42px; font-weight: 500; letter-spacing: 2px;
    color: var(--gold);
    margin: 0 0 10px;
    text-transform: uppercase;
  }
  .hero-divider {
    display: inline-block;
    width: 60px; height: 1px;
    background: var(--gold);
    margin: 8px 14px;
    vertical-align: middle;
  }
  .hero-subtitle {
    font-family: "Helvetica Neue", sans-serif;
    font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--muted); margin: 0;
  }

  /* Container */
  .container { max-width: 1400px; margin: 0 auto; padding: 0 32px 80px; }
  .toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; margin-bottom: 28px; }
  .toolbar-left { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .search {
    background: var(--black-soft);
    border: 1px solid var(--line-gold);
    border-radius: 999px; padding: 10px 18px;
    font-size: 13px; min-width: 280px;
    font-family: "Helvetica Neue", sans-serif;
    color: var(--ink); letter-spacing: 0.3px;
  }
  .search::placeholder { color: var(--muted); }
  .search:focus { outline: 1px solid var(--gold); border-color: var(--gold); }

  .filter-tabs {
    display: flex; gap: 4px;
    background: var(--black-soft);
    padding: 4px;
    border-radius: 999px;
    border: 1px solid var(--line-gold);
  }
  .filter-tab {
    padding: 8px 18px; border-radius: 999px;
    font-family: "Helvetica Neue", sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer; color: var(--muted); transition: all .2s;
    border: none; background: transparent;
  }
  .filter-tab.active {
    background: var(--gold);
    color: var(--black);
  }
  .filter-tab:not(.active):hover { color: var(--gold); }

  .stats {
    font-family: "Helvetica Neue", sans-serif;
    font-size: 11px; color: var(--muted);
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .stats strong { color: var(--gold); font-weight: 700; font-size: 13px; }

  /* Category */
  .category { margin-bottom: 48px; }
  .category-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; padding-bottom: 14px;
    border-bottom: 1px solid var(--line-gold);
  }
  .category-title {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 24px; font-weight: 500; letter-spacing: 4px;
    color: var(--gold); text-transform: uppercase;
    display: flex; align-items: center; gap: 14px;
  }
  .category-title::before {
    content: ""; width: 4px; height: 22px;
    background: linear-gradient(180deg, var(--gold-light), var(--gold-dark));
    border-radius: 1px;
  }
  .category-count {
    background: transparent;
    color: var(--gold); font-family: "Helvetica Neue", sans-serif;
    font-size: 10px; font-weight: 600; letter-spacing: 2px;
    padding: 4px 12px; border-radius: 999px;
    border: 1px solid var(--gold);
    text-transform: uppercase;
  }

  /* Grid + Cards */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; }
  .card {
    background: linear-gradient(180deg, var(--black-card) 0%, var(--black) 100%);
    border-radius: 4px;
    padding: 18px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line-gold);
    transition: all .3s ease;
    display: flex; flex-direction: column; gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0; transition: opacity .3s;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: rgba(201, 165, 92, 0.5);
    box-shadow: var(--shadow), var(--shadow-gold);
  }
  .card:hover::before { opacity: 1; }

  .card-img-wrap {
    position: relative; width: 100%; aspect-ratio: 1 / 1;
    background: #fff;
    border-radius: 2px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--line);
  }
  .card-img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .card-img-placeholder {
    color: #888; font-family: "Helvetica Neue", sans-serif;
    font-size: 11px; font-weight: 600; text-align: center;
    padding: 16px; letter-spacing: 1px; text-transform: uppercase;
  }

  .card-cat-pill {
    font-family: "Helvetica Neue", sans-serif;
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2px; padding: 3px 10px;
    border-radius: 2px; display: inline-block; align-self: flex-start;
  }
  .pill-new {
    background: var(--gold);
    color: var(--black);
  }
  .pill-ready {
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
  }

  .card-name {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 500; font-size: 15px; line-height: 1.35;
    color: var(--ink); padding: 0 2px;
    min-height: 42px;
    letter-spacing: 0.3px;
  }

  .price-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .price-block {
    background: rgba(201, 165, 92, 0.04);
    border-radius: 3px; padding: 9px 11px;
    border: 1px solid var(--line-gold);
  }
  .price-label {
    font-family: "Helvetica Neue", sans-serif;
    font-size: 9px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px;
  }
  .price-value {
    display: flex; align-items: baseline; gap: 3px;
    font-family: "Cormorant Garamond", Georgia, serif;
  }
  .euro { color: var(--gold); font-weight: 600; font-size: 14px; }
  .price-num { font-weight: 600; font-size: 19px; color: var(--ink); letter-spacing: 0.5px; }

  /* Hidden price state */
  .price-hidden .price-num {
    color: var(--muted); font-style: italic; font-size: 14px;
  }
  .price-hidden .euro { display: none; }
  .contact-cta {
    grid-column: 1 / -1;
    text-align: center; padding: 10px;
    background: rgba(201, 165, 92, 0.06);
    border: 1px solid var(--line-gold);
    border-radius: 3px;
    font-family: "Helvetica Neue", sans-serif;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--gold);
  }

  /* Footer */
  .footer {
    text-align: center; color: var(--muted);
    font-family: "Helvetica Neue", sans-serif;
    font-size: 11px;
    margin-top: 60px; padding: 30px 20px 0;
    border-top: 1px solid var(--line-gold);
    letter-spacing: 1px;
  }
  .footer strong {
    color: var(--gold); font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 16px; font-weight: 500; letter-spacing: 3px;
    text-transform: uppercase;
    display: block; margin-bottom: 6px;
  }
  .footer-divider {
    display: inline-block; width: 40px; height: 1px;
    background: var(--gold-deep); margin: 10px auto;
  }

  .error-box {
    background: rgba(150, 30, 30, 0.1);
    border: 1px solid rgba(201, 165, 92, 0.3);
    color: var(--gold);
    padding: 24px; border-radius: 4px;
    margin: 40px auto; max-width: 600px;
    text-align: center;
    font-family: "Helvetica Neue", sans-serif; font-size: 13px;
  }
  .empty-state {
    text-align: center; color: var(--muted);
    padding: 80px 20px; font-size: 16px;
    font-family: "Cormorant Garamond", Georgia, serif;
    letter-spacing: 1px;
  }

  @media (max-width: 600px) {
    header.topbar { padding: 16px 18px; flex-direction: column; align-items: flex-start; gap: 12px; }
    .brand-logo { height: 44px; }
    .container { padding: 0 16px 60px; }
    .hero-title { font-size: 28px; letter-spacing: 1px; }
    .search { min-width: 0; width: 100%; }
    .toolbar-left { width: 100%; }
    .filter-tabs { width: 100%; justify-content: center; }
  }
</style>
</head>

<script>
let products = [];
let showPrices = true; // controlled by catalog.json
let activeFilter = "all";
let searchQuery = "";

async function loadCatalog() {
  try {
    const res = await fetch("catalog.json?t=" + Date.now());
    if (!res.ok) throw new Error("Failed");
    const data = await res.json();
    products = data.products || [];
    showPrices = (data.showPrices !== false); // default true if missing

    if (data.exportedAt) {
      const d = new Date(data.exportedAt);
      const opts = { day: "2-digit", month: "short", year: "numeric" };
      document.getElementById("lastUpdated").textContent =
        "Përditësuar: " + d.toLocaleDateString("sq-AL", opts);
    }
    render();
  } catch (e) {
    document.getElementById("categoriesContainer").innerHTML = `
      <div class="error-box">
        <strong>Gabim në ngarkim</strong><br>
        Katalogu nuk u ngarkua. Provo të rifreskosh faqen.
      </div>`;
  } finally {
    setTimeout(() => document.getElementById("loading").classList.add("hidden"), 300);
  }
}

function getImageFor(p) {
  if (p.customImage) return p.customImage;
  if (typeof p.imgIdx === "number" && p.imgIdx >= 0 &&
      window.EPIC_IMAGES && p.imgIdx < window.EPIC_IMAGES.length) {
    return window.EPIC_IMAGES[p.imgIdx];
  }
  return null;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

function render() {
  const container = document.getElementById("categoriesContainer");
  container.innerHTML = "";
  const filtered = products.filter(p => {
    if (activeFilter !== "all" && p.cat !== activeFilter) return false;
    if (searchQuery && !p.name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    return true;
  });
  document.getElementById("totalCount").textContent = filtered.length;

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">Asnjë produkt nuk u gjet.</div>`;
    return;
  }

  const cats = activeFilter === "all" ? ["new","ready"] : [activeFilter];
  const catNames = { new: "New Arrivals", ready: "Ready Stock" };
  cats.forEach(cat => {
    const items = filtered.filter(p => p.cat === cat);
    if (items.length === 0) return;
    const section = document.createElement("div");
    section.className = "category";
    const header = document.createElement("div");
    header.className = "category-header";
    header.innerHTML = `<div class="category-title">${catNames[cat]}</div><div class="category-count">${items.length} produkte</div>`;
    section.appendChild(header);
    const grid = document.createElement("div");
    grid.className = "grid";
    items.forEach(p => grid.appendChild(buildCard(p)));
    section.appendChild(grid);
    container.appendChild(section);
  });
}

function buildCard(p) {
  const card = document.createElement("div");
  card.className = "card";
  const pillClass = p.cat === "new" ? "pill-new" : "pill-ready";
  const pillText = p.cat === "new" ? "New" : "Ready";
  const imgSrc = getImageFor(p);
  const imgContent = imgSrc
    ? `<img class="card-img" src="${imgSrc}" alt="${escapeHtml(p.name)}" loading="lazy">`
    : `<div class="card-img-placeholder">Pa foto</div>`;

  const priceSection = showPrices ? `
    <div class="price-row">
      <div class="price-block">
        <div class="price-label">Case Unit</div>
        <div class="price-value"><span class="euro">€</span><span class="price-num">${Number(p.caseP).toFixed(2)}</span></div>
      </div>
      <div class="price-block">
        <div class="price-label">Pallet Unit</div>
        <div class="price-value"><span class="euro">€</span><span class="price-num">${Number(p.palletP).toFixed(2)}</span></div>
      </div>
    </div>
  ` : `
    <div class="contact-cta">Kërkoni çmimin · Kontaktoni</div>
  `;

  card.innerHTML = `
    <div class="card-img-wrap">${imgContent}</div>
    <span class="card-cat-pill ${pillClass}">${pillText}</span>
    <div class="card-name">${escapeHtml(p.name)}</div>
    ${priceSection}
  `;
  return card;
}

document.querySelectorAll(".filter-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    activeFilter = tab.dataset.filter;
    render();
  });
});
document.getElementById("search").addEventListener("input", (e) => {
  searchQuery = e.target.value;
  render();
});

loadCatalog();
</script>
</body>
</html>
